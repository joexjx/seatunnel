######
###### This config is for testing that source parallelism overrides env parallelism, and the task runs error when single split source parallelism is not 1.
######

env {
  parallelism = 1
  job.mode = "BATCH"
  spark.executor.instances = 1
  spark.executor.cores = 1
  spark.executor.memory = "1g"
  spark.master = local
}

source {
  TestSingleSplitSource {
    plugin_output = "test_single_split"
    parallelism = 5
    plugin_name = "TestSingleSplitSource"
    schema = {
    }
  }
}

transform {
}

sink {
  InMemory {
    plugin_input = "test_single_split"
    plugin_name = "InMemory"
  }
}